{% extends 'base.html' %}

{% block content %}

<div class="text-center">

    <h1 class="text-4xl">{{ room.name }}</h1>

    <div class="flex flex-col mx-4 lg:w-[75%] lg:mx-auto">
        <div id="chat-box" class="flex-1 overflow-y-auto mb-4 card bg-base-100 shadow-lg p-4">

            {% for message in messages %}
                <div class="chat chat-start">
                  <div class="chat-image avatar">
                    <div class="w-10 rounded-full">
                      <img
                        alt="Tailwind CSS chat bubble component"
                        src="https://img.daisyui.com/images/profile/demo/kenobee@192.webp"
                      />
                    </div>
                  </div>
                  <div class="chat-header">
                    {{ message.user.username }}
                    <time class="text-xs opacity-50">{{ message.created_at }}</time>
                  </div>
                  <div class="chat-bubble">{{ message.content }}</div>
                  <div class="chat-footer opacity-50">Delivered</div>
                </div>
            {% empty %}
                <p class="mt-4 text-xl">There are currently no messages in this room!</p>
            {% endfor %}

        </div>
    </div>
</div>

{% endblock %}
